<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DecisionOS</title>
    <style>
      :root {
        --ink: #0f172a;
        --muted: #475569;
        --line: rgba(15, 23, 42, 0.14);
        --brand: #0ea5e9;
        --accent: #f97316;
      }

      body {
        margin: 0;
        min-width: 360px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        color: var(--ink);
        background: linear-gradient(155deg, #f8fafc, #ecfeff);
      }

      .shell {
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .top {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: white;
      }

      .title {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
      }

      .sub {
        margin: 4px 0 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .tag-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .tag {
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 600;
        background: rgba(14, 165, 233, 0.12);
        color: #0c4a6e;
        border: 1px solid rgba(14, 165, 233, 0.24);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        background: white;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
      }

      .value {
        margin-top: 4px;
        font-weight: 700;
        font-size: 13px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: white;
        padding: 10px;
      }

      .panel h3 {
        margin: 0 0 8px;
        font-size: 13px;
      }

      .item {
        border-left: 3px solid rgba(249, 115, 22, 0.45);
        padding-left: 8px;
        margin-bottom: 8px;
      }

      .item .t {
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 10px;
        color: #9a3412;
      }

      .item .m {
        margin-top: 3px;
        font-size: 12px;
      }

      .empty {
        color: var(--muted);
        font-size: 12px;
      }

      .score {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.1);
        margin-top: 6px;
        overflow: hidden;
      }

      .score > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--brand), var(--accent));
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="top">
        <p class="title">DecisionOS Context Monitor</p>
        <p class="sub" id="tab-url">Waiting for active tab...</p>
        <div class="tag-row">
          <span class="tag" id="activity">activity: reading</span>
          <span class="tag" id="category">category: consuming_content</span>
          <span class="tag" id="domain">domain: unknown</span>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <div class="label">Issue Signal</div>
          <div class="value" id="issue">None</div>
        </article>
        <article class="card">
          <div class="label">Friction</div>
          <div class="value" id="friction">0%</div>
          <div class="score"><span id="friction-bar" style="width: 0%"></span></div>
        </article>
        <article class="card">
          <div class="label">Typing Speed</div>
          <div class="value" id="typing">0 keys/s</div>
        </article>
        <article class="card">
          <div class="label">Idle</div>
          <div class="value" id="idle">0s</div>
        </article>
        <article class="card">
          <div class="label">Keystrokes</div>
          <div class="value" id="keys">0</div>
        </article>
        <article class="card">
          <div class="label">Tab Switches</div>
          <div class="value" id="switches">0</div>
        </article>
      </section>

      <section class="panel">
        <h3>Latest Intervention</h3>
        <div id="latest" class="empty">No intervention yet.</div>
      </section>

      <section class="panel">
        <h3>Timeline</h3>
        <div id="timeline" class="empty">No events yet.</div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
